name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-nodes@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm lint
      - run: npm type-check
      - run: npm build